- type: custom-api
  frameless: true
  title: Jellyfin History
  cache: 5m
  url: http://10.40.0.40:8096/Users?api_key=${JELLYFIN_API_KEY}
  template: |
    {{ if eq .Response.StatusCode 200 }}
      <p>Jellyfin history widget - configure with your Jellyfin API key</p>
    {{ else }}
      <p>Failed to connect to Jellyfin</p>
    {{ end }}
