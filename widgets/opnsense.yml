- type: custom-api
  title: OPNsense
  title-url: https://10.40.0.1
  cache: 2m
  url: https://10.40.0.1/api/diagnostics/system/systemTime
  allow-insecure: true
  headers:
    Authorization: "Basic ${OPNSENSE_BASIC}"
  subrequests:
    wireguard:
      url: https://10.40.0.1/api/wireguard/service/show
      allow-insecure: true
      headers:
        Authorization: "Basic ${OPNSENSE_BASIC}"
    firewall:
      url: https://10.40.0.1/api/diagnostics/firewall/pf_states/1
      allow-insecure: true
      headers:
        Authorization: "Basic ${OPNSENSE_BASIC}"
  template: |
    <style>
      .opn-section { margin-bottom: 12px; }
      .opn-section:last-child { margin-bottom: 0; }
      .opn-label { font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.6; margin-bottom: 4px; }
      .opn-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 6px; }
      .opn-card { padding: 8px; border-radius: 6px; background: color-mix(in srgb, var(--color-widget-background-highlight) 50%, transparent); }
      .opn-value { font-size: 1.1em; font-weight: 600; }
      .opn-sub { font-size: 0.75em; opacity: 0.6; }
      .opn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
      .opn-dot-up { background: var(--color-positive); }
      .opn-dot-down { background: var(--color-negative); }
      .opn-dot-idle { background: var(--color-primary); opacity: 0.3; }
      .opn-peer { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid color-mix(in srgb, var(--color-text-base) 10%, transparent); }
      .opn-peer:last-child { border-bottom: none; }
      .opn-vlan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; margin-top: 4px; }
      .opn-vlan { display: flex; align-items: center; padding: 3px 0; }
    </style>

    {{ $sys := .JSON }}
    {{ $wg := (.Subrequest "wireguard").JSON }}
    {{ $fw := (.Subrequest "firewall").JSON }}

    <div class="opn-section">
      <div class="opn-label">System</div>
      <div class="opn-grid-3">
        <div class="opn-card text-center">
          <div class="opn-value color-highlight">{{ $sys.String "uptime" }}</div>
          <div class="opn-sub">UPTIME</div>
        </div>
        <div class="opn-card text-center">
          <div class="opn-value color-highlight">{{ $sys.String "loadavg" }}</div>
          <div class="opn-sub">LOAD</div>
        </div>
        <div class="opn-card text-center">
          <div class="opn-value color-highlight">{{ $fw.String "current" }}</div>
          <div class="opn-sub">FW STATES</div>
        </div>
      </div>
    </div>

    <div class="opn-section">
      <div class="opn-label">VLANs</div>
      <div class="opn-vlan-grid">
        <div class="opn-vlan"><span class="opn-dot opn-dot-up"></span><span class="size-h4">VLAN10</span><span class="opn-sub">&nbsp;10.10.0.0/24</span></div>
        <div class="opn-vlan"><span class="opn-dot opn-dot-up"></span><span class="size-h4">VLAN20</span><span class="opn-sub">&nbsp;10.20.0.0/24</span></div>
        <div class="opn-vlan"><span class="opn-dot opn-dot-up"></span><span class="size-h4">VLAN30</span><span class="opn-sub">&nbsp;10.30.0.0/24</span></div>
        <div class="opn-vlan"><span class="opn-dot opn-dot-up"></span><span class="size-h4">VLAN40</span><span class="opn-sub">&nbsp;10.40.0.0/24</span></div>
        <div class="opn-vlan"><span class="opn-dot opn-dot-up"></span><span class="size-h4">VLAN50</span><span class="opn-sub">&nbsp;10.50.0.0/24</span></div>
        <div class="opn-vlan"><span class="opn-dot opn-dot-up"></span><span class="size-h4">VLAN70</span><span class="opn-sub">&nbsp;10.70.0.0/24</span></div>
      </div>
    </div>

    <div class="opn-section">
      <div class="opn-label">WireGuard VPN</div>
      {{ range $wg.Array "rows" }}
        {{ if eq (.String "type") "peer" }}
          <div class="opn-peer">
            <div>
              {{ if eq (.String "peer-status") "online" }}
                <span class="opn-dot opn-dot-up"></span>
              {{ else }}
                <span class="opn-dot opn-dot-down"></span>
              {{ end }}
              <span class="size-h4 color-primary">{{ .String "name" }}</span>
            </div>
            <div class="opn-sub">
              {{ if eq (.String "peer-status") "online" }}
                {{ .String "endpoint" }}
              {{ else }}
                offline
              {{ end }}
            </div>
          </div>
        {{ end }}
      {{ end }}
    </div>