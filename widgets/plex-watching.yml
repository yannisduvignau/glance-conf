- type: custom-api
  title: Jellyfin - Now Playing
  cache: 1m
  url: http://10.40.0.40:8096/Sessions?api_key=${JELLYFIN_API_KEY}
  template: |
    {{ if eq .Response.StatusCode 200 }}
      {{ $sessions := .JSON.Array "" }}
      {{ $playing := 0 }}
      {{ range $sessions }}
        {{ if .Exists "NowPlayingItem" }}
          {{ $playing = add $playing 1 }}
        {{ end }}
      {{ end }}
      {{ if eq $playing 0 }}
        <p>Nobody is watching at this moment.</p>
      {{ else }}
        <div class="flex flex-column gap-10">
          {{ range $sessions }}
            {{ if .Exists "NowPlayingItem" }}
              <div class="card gap-5">
                <div class="flex items-center gap-10 size-h3">
                  <span class="color-primary">{{ .String "UserName" }}</span>
                </div>
                <hr class="margin-bottom-5" />
                <div>
                  {{ if eq (.String "NowPlayingItem.Type") "Episode" }}
                    <div class="text-truncate">{{ .String "NowPlayingItem.SeriesName" }}</div>
                    <div class="text-truncate">S{{ .String "NowPlayingItem.ParentIndexNumber" }}E{{ .String "NowPlayingItem.IndexNumber" }} - {{ .String "NowPlayingItem.Name" }}</div>
                  {{ else }}
                    <div class="text-truncate">{{ .String "NowPlayingItem.Name" }}</div>
                  {{ end }}
                </div>
              </div>
            {{ end }}
          {{ end }}
        </div>
      {{ end }}
    {{ else }}
      <p>Failed to fetch Jellyfin sessions</p>
    {{ end }}
